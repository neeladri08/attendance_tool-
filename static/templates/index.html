<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .form-container {
      background: #fff;
      padding: 25px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 350px;
    }

    .form-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
      color: #444;
    }

    input, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      font-size: 14px;
    }

    input:focus, select:focus {
      border-color: #007bff;
    }

    .btn {
      width: 100%;
      padding: 10px;
      background: #007bff;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn:hover {
      background: #0056b3;
    }
    .logo{
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .logo img{
      margin-left: auto;
      margin-right: auto;
      border-radius: 50%;
    }

  </style>
</head>
<body>
  <div class="form-container">
    <div class="logo">
      <img height="80px" width="80px" src="logo.jpg" alt="University Logo">
    </div>
    <h3 style="text-align:center; margin-bottom:5px;">SWAMI VIVEKANANDA UNIVERSITY</h3>
    <h2>Attendance Form</h2>
    <form method="POST" action="/">
  
      <div class="form-group">
        <label for="roll">Roll Number</label>
        <input type="text" id="roll" name="roll" placeholder="Enter Roll Number" required>
      </div>

      <div class="form-group">
        <label for="name">Student Name</label>
        <input type="text" id="name" name="name" placeholder="Enter Full Name" required>
      </div>

      <div class="form-group">
        <label for="year">Year</label>
        <select id="year" name="year" required>
          <option value="">-- Select Year --</option>
          <option value="1">1st Year</option>
          <option value="2">2nd Year</option>
          <option value="3">3rd Year</option>
          <option value="4">4th Year</option>
        </select>
      </div>

      <div class="form-group">
        <label for="DEPERTMENT"> DEPARTMENT </label>
        <select id="DEPERTMENT" name="DEPERTMENT" required>
          <option value="">-- Select Department --</option>
          <option value="CSE"> CSE</option>
          <option value="BCA"> BCA</option>
          <option value="BBA ">BBA</option>
          
        </select>
      </div>

      <button type="submit" class="btn">Submit Attendance</button>
    </form>
  </div>
</body>
</html>
